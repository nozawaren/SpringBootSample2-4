# DataSource 
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE 
spring.datasource.driver-class-name=org.h2.Driver
spring.datasouce.username=sa
spring.datasouce.password= 
spring.datasource.sql-script-encoding=UTF-8
spring.datasource.initialize=true
spring.datasource.schema=classpath:schema.sql
spring.datasource.data=classpath:data.sql 

#H2DB
spring.h2.console.enabled=true

#message
spring.messages.basename=il8n/messages,il8n/ValidationMessages

# MyBatisで使用するXMLの格納先を指定する
#MyBatis
mybatis.mapper-locations=classpath*:/mapper/h2/*.xml
#SQLの検索結果をキャメルケースに変換する
mybatis.configuration.map-underscore-to-camel-case=true 
#データ型を指定する際にパッケージ名を省略することができる
mybatis.type-aliases-package=com.example.domain.user.model

# ログレベルをdebugに設定することでMyBatisのログが出力されるようになる
#Log Level
logging.level.com.example=debug
<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}"> 
<head> 
	<title>ユーザー詳細</title> 
	<!-- CSS読込 --> 
	<link rel="stylesheet" th:href="@{/css/user/list.css}"> 
</head> 
<body> 
	<div layout:fragment="content"> 
		<div class="header border-bottom"> 
			<h1 class="h2">ユーザー詳細</h1> 
		</div> 
		<form id="user-detail-form" method="post" th:action="@{/user/detail}" class="form-signup" th:object="${userDetailForm}"> 
				<!-- UserDetaiForm.java内のuserIdの型として入力値を設定する -->
			<input type="hidden" th:field="*{userId}" />
			<!-- ユーザー詳細情報 --> 
			<table class="table table-striped table-bordered table-hover"> 
				<tbody> 
					<tr> 
						<th class="w-25">ユーザーID</th> 
						<td th:text="*{userId}"></td> 
					</tr> 
					<tr> 
						<th>パスワード</th> 
						<td> 
							<input type="text" class="form-control" th:field="*{password}"/> 
						</td> 
					</tr> 
					<tr> 
						<th>ユーザー名</th> 
						<td> 
							<input type="text" class="form-control" th:field="*{userName}"/> 
						</td> 
					</tr> 
					<tr> 
						<th>誕生日</th> 
						<td th:text="*{#dates.format(birthday, 'YYYY/MM/dd')}"></td> 
					</tr> 
					<tr> 
						<th>年齢</th> 
						<td th:text="*{age}"></td> 
					</tr> 
					<tr> 
						<th>性別</th> 
						<td th:text="*{gender == 1 ? '男性': '女性'}"></td> 
					</tr> 
					<tr> 
						<th>部署名</th> 
						<td> 
							<!-- departmentがnullでない場合、departmentNameを表示する -->
							<span th:if="*{department != null}" th:text="*{department.departmentName}"> </span> 
						</td> 
					</tr> 
				</tbody> 
			</table> 
			<!-- ボタンエリア --> 
			<div class="text-center"> 
				<!-- 削除ボタン --> 
				<!-- UserDetailController.javaのparamsがdeleteの処理を呼び出すボタンを作成する -->
				<button class="btn btn-danger" type="submit" name="delete"> 
					削除 
				</button> 
				<!-- 更新ボタン --> 
				<!-- UserDetailController.javaのparamsがupdateの処理を呼び出すボタンを作成する -->
				<button class="btn btn-primary" type="submit" name="update"> 
					更新 
				</button> 
			</div>
			<!-- 給料情報 --> 
			<!-- salaryListがnull以外かつサイズが0より大きい場合htmlを表示する -->
			<th:block th:if="*{salaryList != null and salaryList.size() > 0}"> 
				<div class="header border-bottom"> 
					<h1 class="h2">給料</h1> 
				</div> 
				<table class="table table-striped table-bordered table-hover"> 
					<thead> 
						<tr> 
							<th class="w-25">年月</th> 
							<th>給料</th> 
						</tr> 
					</thead> 
					<tbody> 
						<!-- salaryListをitemとしてtrタグないで使用する -->
						<tr th:each="item: *{salaryList}"> 
							<!-- yearMonthを表示する -->
							<td th:text="${item.yearMonth}"></td>
							<!-- 数値型でitem.salaryを3桁ごとにコンマを追加して表示をする --> 
							<td th:text="${#numbers.formatInteger(item.salary, 3, 'COMMA')}"> </td> 
						</tr> 
					</tbody> 
				</table> 
			</th:block>
		</form> 
	</div> 
</body> 
</html>

<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org"> 
<head> 
	<meta charset="utf-8" /> 
	<title>Error</title> 
</head> 
<body> 
	<!--エラー発生時に遷移し${status}でエラーコード、${error}でエラー内容を表示する-->
	<h1 th:text="${status} + ' ' + ${error}"></h1> 
	<!--${message}でエラーメッセージを表示する -->
	<p th:text="${message}"></p> 
	<p>ログイン画面に戻ってください</p> 
	<form method="post" th:action="@{/logout}"> 
		<button class="btn btn-link" type="submit">ログイン画面に戻る</button> 
	</form> 
</body> 
</html>

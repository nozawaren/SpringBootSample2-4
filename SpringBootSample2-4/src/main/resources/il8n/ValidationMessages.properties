# =============================
# バリエーションエラーメッセージ
# =============================
# {}内の値にはsignupForm.java内の@NotBlank()の引数を設定しエラーメッセージを作成する
NotBlank={0}は必須入力です
# {}内の値にはsignupForm.java内の@Email()の引数を設定しエラーメッセージを作成する
Email={0}はメールアドレス形式で入力してください
# {}内の値にはsignupForm.java内の@Length()の引数を設定しエラーメッセージを作成する
Length={0}は、{2}桁以上、{1}桁以下で入力してください
# {}内の値にはsignupForm.java内の@Pattern()の引数を設定しエラーメッセージを作成する
Pattern={0}は半角英数字で入力してください
# {}内の値にはsignupForm.java内の@NotNull()の引数を設定しエラーメッセージを作成する
NotNull={0}は必須入力です
# {}内の値にはsignupForm.java内の@Min()の引数を設定しエラーメッセージを作成する
Min={0}は{1}以上を入力してください
# {}内の値にはsignupForm.java内の@Max()の引数を設定しエラーメッセージを作成する
Max={0}は{1}以下を入力してください